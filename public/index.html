<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clima</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --surface: #0e1117;
      --border: rgba(255,255,255,0.06);
      --accent: #4af0c4;
      --accent2: #4a8ff0;
      --text: #e8ecf0;
      --muted: #5a6370;
      --card: rgba(255,255,255,0.03);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* Background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -200px; left: -200px;
    }
    body::after {
      width: 500px; height: 500px;
      background: var(--accent2);
      bottom: -150px; right: -150px;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeDown 0.7s ease both;
    }

    header .label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 10vw, 100px);
      line-height: 0.9;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
    }

    /* Search */
    .search-wrap {
      width: 100%;
      max-width: 520px;
      margin-bottom: 48px;
      animation: fadeDown 0.7s 0.1s ease both;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px 6px 6px 20px;
      transition: border-color 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,240,196,0.08);
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
    }

    .search-box input::placeholder { color: var(--muted); }

    .search-box button {
      background: var(--accent);
      color: #07090f;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .search-box button:hover { opacity: 0.85; transform: scale(0.98); }
    .search-box button:active { transform: scale(0.95); }

    /* Loading */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }

    .loading.show { display: flex; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Error */
    .error-msg {
      display: none;
      background: rgba(240,80,80,0.08);
      border: 1px solid rgba(240,80,80,0.2);
      color: #f05050;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 13px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }
    .error-msg.show { display: block; }

    /* Result */
    .result {
      display: none;
      width: 100%;
      max-width: 820px;
      flex-direction: column;
      gap: 16px;
      animation: fadeUp 0.5s ease both;
    }
    .result.show { display: flex; }

    /* Hero card */
    .hero-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(74,240,196,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-left .city-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 6vw, 58px);
      letter-spacing: 1px;
      line-height: 1;
    }

    .hero-left .country {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hero-left .description {
      margin-top: 16px;
      font-size: 15px;
      color: var(--text);
      font-weight: 300;
      text-transform: capitalize;
    }

    .hero-left .source-badge {
      display: inline-block;
      margin-top: 14px;
      background: rgba(74,240,196,0.1);
      color: var(--accent);
      border: 1px solid rgba(74,240,196,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hero-left .source-badge.api {
      background: rgba(74,143,240,0.1);
      color: var(--accent2);
      border-color: rgba(74,143,240,0.2);
    }

    .hero-right {
      text-align: right;
    }

    .hero-right .temp {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 12vw, 110px);
      line-height: 1;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-right .feels {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .stat-card:hover {
      border-color: rgba(74,240,196,0.2);
      transform: translateY(-2px);
    }

    .stat-card .stat-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-card .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1;
    }

    .stat-card .stat-unit {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--muted);
      margin-left: 2px;
    }

    /* Forecast */
    .forecast-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
    }

    .forecast-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
    }

    .forecast-day {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 14px;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
    }

    .forecast-day:hover {
      border-color: rgba(74,240,196,0.2);
      transform: translateY(-2px);
    }

    .forecast-day .day-name {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .forecast-day .day-temp-max {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--text);
    }

    .forecast-day .day-temp-min {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .forecast-day .day-icon {
      font-size: 22px;
      margin: 8px 0;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .hero-card { flex-direction: column; align-items: flex-start; }
      .hero-right { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="label">Previsão do Tempo</div>
      <h1>CLIMA</h1>
      <p>Busque qualquer cidade do mundo</p>
    </header>

    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="cityInput" placeholder="Digite o nome da cidade..." autocomplete="off"/>
        <button onclick="fetchWeather()">Buscar</button>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Buscando dados...</span>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
      <div class="hero-card">
        <div class="hero-left">
          <div class="city-name" id="cityName">—</div>
          <div class="country" id="country">—</div>
          <div class="description" id="description">—</div>
          <span class="source-badge" id="sourceBadge">—</span>
        </div>
        <div class="hero-right">
          <div class="temp" id="temp">—</div>
          <div class="feels" id="feels">—</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Umidade</div>
          <div class="stat-value" id="humidity">—<span class="stat-unit">%</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Vento</div>
          <div class="stat-value" id="wind">—<span class="stat-unit">km/h</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Visibilidade</div>
          <div class="stat-value" id="visibility">—<span class="stat-unit">km</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">UV Index</div>
          <div class="stat-value" id="uvindex">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pressão</div>
          <div class="stat-value" id="pressure">—<span class="stat-unit">mb</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Precipitação</div>
          <div class="stat-value" id="precip">—<span class="stat-unit">mm</span></div>
        </div>
      </div>

      <div class="forecast-title">Próximos 7 dias</div>
      <div class="forecast-row" id="forecastRow"></div>
    </div>
  </div>

  <script>
    const API_BASE = '';

    const input = document.getElementById('cityInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchWeather(); });

    function getWeatherIcon(condition) {
      if (!condition) return '🌡️';
      const c = condition.toLowerCase();
      if (c.includes('rain') || c.includes('chuva')) return '🌧️';
      if (c.includes('storm') || c.includes('thunder')) return '⛈️';
      if (c.includes('snow') || c.includes('neve')) return '❄️';
      if (c.includes('cloud') || c.includes('nublado') || c.includes('overcast')) return '☁️';
      if (c.includes('fog') || c.includes('nevoeiro')) return '🌫️';
      if (c.includes('wind') || c.includes('vento')) return '💨';
      if (c.includes('clear') || c.includes('limpo') || c.includes('sunny')) return '☀️';
      if (c.includes('partly')) return '⛅';
      return '🌤️';
    }

    function getDayName(dateStr) {
      const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      const d = new Date(dateStr + 'T12:00:00');
      return days[d.getDay()];
    }

    async function fetchWeather() {
      const city = input.value.trim();
      if (!city) return;

      // Reset UI
      document.getElementById('loading').classList.add('show');
      document.getElementById('result').classList.remove('show');
      document.getElementById('errorMsg').classList.remove('show');

      try {
        const res = await fetch(`https://api.weatherapi.com/v1/forecast.json?key=6N53DV5XH4VEGTUX633DYWBNL&q=${encodeURIComponent(city)}&days=7`);
        const json = await res.json();

        if (!res.ok) {
          throw new Error(json.error || 'Erro ao buscar dados.');
        }

        const d = json.data;
        const current = d.currentConditions;

        // Hero
        document.getElementById('cityName').textContent = d.resolvedAddress?.split(',')[0] || city;
        document.getElementById('country').textContent = d.resolvedAddress || '';
        document.getElementById('description').textContent = current.conditions || '—';
        document.getElementById('temp').textContent = Math.round(current.temp) + '°';
        document.getElementById('feels').textContent = `Sensação: ${Math.round(current.feelslike)}°C`;

        const badge = document.getElementById('sourceBadge');
        badge.textContent = json.source === 'cache' ? '⚡ Cache' : '🌐 API';
        badge.className = 'source-badge' + (json.source === 'cache' ? '' : ' api');

        // Stats
        document.getElementById('humidity').innerHTML = `${Math.round(current.humidity)}<span class="stat-unit">%</span>`;
        document.getElementById('wind').innerHTML = `${Math.round(current.windspeed)}<span class="stat-unit">km/h</span>`;
        document.getElementById('visibility').innerHTML = `${Math.round(current.visibility)}<span class="stat-unit">km</span>`;
        document.getElementById('uvindex').textContent = current.uvindex ?? '—';
        document.getElementById('pressure').innerHTML = `${Math.round(current.pressure)}<span class="stat-unit">mb</span>`;
        document.getElementById('precip').innerHTML = `${current.precip ?? 0}<span class="stat-unit">mm</span>`;

        // Forecast
        const forecastRow = document.getElementById('forecastRow');
        forecastRow.innerHTML = '';
        const days = d.days?.slice(0, 7) || [];
        days.forEach(day => {
          const div = document.createElement('div');
          div.className = 'forecast-day';
          div.innerHTML = `
            <div class="day-name">${getDayName(day.datetime)}</div>
            <div class="day-icon">${getWeatherIcon(day.conditions)}</div>
            <div class="day-temp-max">${Math.round(day.tempmax)}°</div>
            <div class="day-temp-min">${Math.round(day.tempmin)}°</div>
          `;
          forecastRow.appendChild(div);
        });

        document.getElementById('result').classList.add('show');
      } catch (err) {
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = err.message;
        errEl.classList.add('show');
      } finally {
        document.getElementById('loading').classList.remove('show');
      }
    }
  </script>
</body>
</html>
